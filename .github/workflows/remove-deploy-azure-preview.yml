name: remove-api-deploy-previews

on:
  pull_request:
    branches:
      - staging
    types:
      - closed

env:
  RG: airqo-main-rg

jobs:

  branch-name:
    name: Format branch name string
    runs-on: ubuntu-latest
    outputs:
      lowercase: ${{ steps.string.outputs.lowercase }}
    steps:
      - id: string
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ github.head_ref || github.ref_name }}

########################################################
# REMOVE AUTH SERVICE PREVIEW
########################################################

  remove-auth-service-preview:
    name: remove-auth-service-preview
    needs: [branch-name]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name ${{ needs.branch-name.outputs.lowercase }}-auth-service-preview \
            --resource-group ${{ env.RG }} \
            --yes || echo "Preview not found"

