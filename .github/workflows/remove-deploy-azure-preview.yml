name: remove-api-deploy-previews

on:
  pull_request:
    branches:
      - staging
    types:
      - closed

env:
  RG: airqo-main-rg

jobs:

  branch-name:
    name: Format branch name string
    runs-on: ubuntu-latest
    outputs:
      sanitized: ${{ steps.sanitize.outputs.sanitized }}
    steps:
      - id: string
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ github.head_ref || github.ref_name }}

      - id: sanitize
        run: |
          BRANCH="${{ steps.string.outputs.lowercase }}"
          # Replace non-alphanumeric chars with hyphens, collapse multiples, trim
          SANITIZED=$(echo "$BRANCH" | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          # Fall back to PR number if sanitization yields an empty string
          if [ -z "$SANITIZED" ]; then
            SANITIZED="pr${{ github.event.pull_request.number }}"
          fi
          # Ensure name starts with a letter (Azure requirement)
          if [[ ! "$SANITIZED" =~ ^[a-z] ]]; then
            SANITIZED="a${SANITIZED}"
          fi
          # Limit to 12 chars and trim any trailing hyphen
          SANITIZED="${SANITIZED:0:12}"
          SANITIZED="${SANITIZED%-}"
          echo "sanitized=$SANITIZED" >> $GITHUB_OUTPUT

########################################################
# REMOVE AUTH SERVICE PREVIEW
########################################################

  remove-auth-service-preview:
    name: remove-auth-service-preview
    needs: [branch-name]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete Container App
        run: |
          az containerapp delete \
            --name "${{ needs.branch-name.outputs.sanitized }}-auth-prev" \
            --resource-group ${{ env.RG }} \
            --yes || echo "Preview not found"

