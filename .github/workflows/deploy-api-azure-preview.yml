name: deploy-api-to-azure-preview-environment

on:
  pull_request:
    branches:
      - staging

env:
  RG: airqo-main-rg
  LOCATION: westeurope
  PR_PREVIEW_ENV: airqo-pr-preview-env
  REGISTRY_URL: airqoacr.azurecr.io
  KEYVAULT: airqo-kv-staging

jobs:

#########################################
# FORMAT BRANCH NAME
#########################################

  branch-name:
    runs-on: ubuntu-latest
    outputs:
      lowercase: ${{ steps.string.outputs.lowercase }}
    steps:
      - id: string
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ github.head_ref || github.ref_name }}

#########################################
# DETECT CHANGED SERVICES
#########################################

  check:
    runs-on: ubuntu-latest
    outputs:
      run_auth_service: ${{ steps.check_files.outputs.run_auth_service }}
      run_device_registry: ${{ steps.check_files.outputs.run_device_registry }}
      run_beacon_api: ${{ steps.check_files.outputs.run_beacon_api }}
      run_predict: ${{ steps.check_files.outputs.run_predict }}
      run_meta_data: ${{ steps.check_files.outputs.run_meta_data }}
      run_view: ${{ steps.check_files.outputs.run_view }}
      run_calibrate: ${{ steps.check_files.outputs.run_calibrate }}
      run_spatial: ${{ steps.check_files.outputs.run_spatial }}
      run_superset: ${{ steps.check_files.outputs.run_superset }}
      run_website_api: ${{ steps.check_files.outputs.run_website_api }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: check modified microservices
        id: check_files
        run: |
          echo "=============== list modified files ==============="
          git diff --name-only HEAD^ HEAD

          echo "========== check paths of modified files =========="
          git diff --name-only HEAD^ HEAD > files.txt

          echo "run_auth_service=false" >>$GITHUB_OUTPUT
          echo "run_device_registry=false" >>$GITHUB_OUTPUT
          echo "run_beacon_api=false" >>$GITHUB_OUTPUT
          echo "run_predict=false" >>$GITHUB_OUTPUT
          echo "run_meta_data=false" >>$GITHUB_OUTPUT
          echo "run_view=false" >>$GITHUB_OUTPUT
          echo "run_calibrate=false" >>$GITHUB_OUTPUT
          echo "run_spatial=false" >>$GITHUB_OUTPUT
          echo "run_superset=false" >>$GITHUB_OUTPUT
          echo "run_website_api=false" >>$GITHUB_OUTPUT

          while IFS= read -r file
          do
            echo $file
            if [[ $file == src/auth-service/* ]]; then
              echo "run_auth_service=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/device-registry/* ]]; then
              echo "run_device_registry=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/beacon-api/* ]]; then
              echo "run_beacon_api=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/predict/* ]]; then
              echo "run_predict=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/meta-data/* ]]; then
              echo "run_meta_data=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/view/* ]]; then
              echo "run_view=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/calibrate/* ]]; then
              echo "run_calibrate=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/spatial/* ]]; then
              echo "run_spatial=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/superset/* ]]; then
              echo "run_superset=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/website/* ]]; then
              echo "run_website_api=true" >>$GITHUB_OUTPUT
            fi

          done < files.txt

#########################################
# AUTH SERVICE PREVIEW
#########################################

  auth-service:
    name: build-push-deploy-auth-service-preview
    needs: [check, branch-name]
    if: needs.check.outputs.run_auth_service == 'true'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.preview.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name airqoacr

      - name: Pull secrets from Key Vault
        run: |
          az keyvault secret show \
            --vault-name ${{ env.KEYVAULT }} \
            --name sta-env-auth-service \
            --query value -o tsv > secrets.json

      - name: Build and push image
        run: |
          cd src/auth-service/
          docker build --target=staging --tag ${{ env.REGISTRY_URL }}/auth-service-pr-preview:${{ github.sha }} .
          docker push ${{ env.REGISTRY_URL }}/auth-service-pr-preview:${{ github.sha }}

      - name: Deploy Container App
        run: |
          BRANCH="${{ needs.branch-name.outputs.lowercase }}"
          APP="${BRANCH:0:12}-auth-prev"

          az containerapp up \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --environment ${{ env.PR_PREVIEW_ENV }} \
            --image ${{ env.REGISTRY_URL }}/auth-service-pr-preview:${{ github.sha }} \
            --target-port 3000 \
            --ingress external \
            --registry-server ${{ env.REGISTRY_URL }} \
            --registry-username airqoacr \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --env-vars "$(jq -r 'to_entries | map("\(.key)=\(.value|tostring)") | join(" ")' secrets.json)"

      - id: preview
        run: |
          BRANCH="${{ needs.branch-name.outputs.lowercase }}"
          APP="${BRANCH:0:12}-auth-prev"

          URL=$(az containerapp show \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "url=https://$URL" >> $GITHUB_OUTPUT

  auth-service-pr-comment:
    needs: [check, auth-service]
    if: needs.check.outputs.run_auth_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Auth-service azure changes in this PR available for preview [here](${{ needs.auth-service.outputs.url }})'
            })

