#########################################
# SUPERSET PREVIEW
#########################################

  superset:
    name: build-push-deploy-superset-preview
    needs: [check, branch-name]
    if: needs.check.outputs.run_superset == 'true'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.preview.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name airqoacr

      - name: Pull secrets from Key Vault
        run: |
          az keyvault secret show \
            --vault-name ${{ env.KEYVAULT }} \
            --name sta-env-superset \
            --query value -o tsv > secrets.json

      - name: Build and push image
        run: |
          cd src/superset/
          docker build --tag ${{ env.REGISTRY_URL }}/superset-pr-preview:${{ github.sha }} .
          docker push ${{ env.REGISTRY_URL }}/superset-pr-preview:${{ github.sha }}

      - name: Deploy Container App
        run: |
          BRANCH="${{ needs.branch-name.outputs.lowercase }}"
          APP="${BRANCH:0:12}-super-prev"

          az containerapp up \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --environment ${{ env.PR_PREVIEW_ENV }} \
            --image ${{ env.REGISTRY_URL }}/superset-pr-preview:${{ github.sha }} \
            --target-port 8088 \
            --ingress external \
            --registry-server ${{ env.REGISTRY_URL }} \
            --registry-username airqoacr \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --env-vars "$(jq -r 'to_entries | map("\(.key)=\(.value|tostring)") | join(" ")' secrets.json)"

      - id: preview
        run: |
          BRANCH="${{ needs.branch-name.outputs.lowercase }}"
          APP="${BRANCH:0:12}-super-prev"

          URL=$(az containerapp show \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "url=https://$URL" >> $GITHUB_OUTPUT

  superset-pr-comment:
    needs: [check, superset]
    if: needs.check.outputs.run_superset == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Superset azure changes in this PR available for preview [here](${{ needs.superset.outputs.url }})'
            })

