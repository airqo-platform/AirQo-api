apiVersion: k8s.nginx.org/v1
kind: VirtualServerRoute
metadata:
  name: workflows
  namespace: pipeline
spec:
  host: platform.airqo.net
  upstreams:
    - name: workflows
      service: workflows-svc
      port: 8080
  subroutes:
    - path: /workflows
      action:
        pass: workflows

---
apiVersion: k8s.nginx.org/v1
kind: VirtualServerRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  host: platform.airqo.net
  upstreams:
    - name: argocd
      service: argocd-server
      port: 443
      tls:
        enable: true
  subroutes:
    - path: /argocd-aks/
      action:
        pass: argocd
    - path: /argocd-aks/(.*)
      action:
        proxy:
          upstream: argocd
          rewritePath: /$1

---
apiVersion: k8s.nginx.org/v1
kind: VirtualServerRoute
metadata:
  name: website
  namespace: production
spec:
  host: platform.airqo.net
  upstreams:
    - name: website
      service: airqo-website-api-svc
      port: 8000
      client-max-body-size: 350m
  subroutes:
    - path: /website
      action:
        pass: website

---
apiVersion: k8s.nginx.org/v1
kind: VirtualServerRoute
metadata:
  name: docs
  namespace: production
spec:
  host: platform.airqo.net
  upstreams:
    - name: docs
      service: airqo-docs-svc
      port: 3000
  subroutes:
    - path: /docs
      action:
        pass: docs

---
apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: platform-virtual-server
  namespace: production
spec:
  host: platform.airqo.net
  upstreams:
    - name: analytics
      service: airqo-next-platform-svc
      port: 3000
    - name: auth-service
      service: airqo-auth-api-svc
      port: 3000
    - name: device-registry
      service: airqo-device-registry-api-svc
      port: 3000
    - name: analytics-api
      service: airqo-analytics-api-svc
      port: 5000
    - name: predict
      service: airqo-prediction-api-svc
      port: 5000
    - name: calibrate
      service: airqo-calibrate-api-svc
      port: 4001
    - name: view
      service: airqo-view-api-svc
      port: 8080
    - name: spatial
      service: airqo-spatial-api-svc
      port: 5000
    - name: beacon
      service: airqo-beacon-api-svc 
      port: 8000        
  routes:
    - path: /workflows
      route: pipeline/workflows
    - path: /argocd-aks/
      route: argocd/argocd
    - path: /docs
      route: production/docs
    - path: /website
      route: production/website
    - path: /
      action:
        redirect:
          url: https://analytics.airqo.net
          code: 301
    - path: ~ /api\/v[1-2]\/users
      action:
        proxy:
          upstream: auth-service
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ /api\/v[1-2]\/devices
      action:
        proxy:
          upstream: device-registry
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ /api\/v[1-2]\/analytics
      action:
        proxy:
          upstream: analytics-api
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
              - name: Access-Control-Allow-Methods
                value: "GET, POST, OPTIONS, PUT, DELETE"
              - name: Access-Control-Allow-Headers
                value: "Content-Type, Authorization, X-Requested-With, X-Auth-Token"
    - path: ~ /api\/v[1-2]\/predict
      action:
        proxy:
          upstream: predict
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ /api\/v[1-2]\/calibrate
      action:
        proxy:
          upstream: calibrate
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ /api\/v[1-2]\/view
      action:
        proxy:
          upstream: view
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ /api\/v[1-2]\/spatial
      action:
        proxy:
          upstream: spatial
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json
    - path: ~ ^/api\/v[1-2]\/beacon(?:/(.*))?$
      action:
        proxy:
          upstream: beacon
          rewritePath: /$1
          responseHeaders:
            add:
              - name: Content-Type
                value: application/json