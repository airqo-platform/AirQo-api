nameOverride: ''
fullnameOverride: ''

images:
  repositories:
    api: airqoacr.azurecr.io/airqo-analytics-api
    celeryBeat: airqoacr.azurecr.io/airqo-analytics-celery-beat
    celeryWorker: airqoacr.azurecr.io/airqo-analytics-celery-worker
    reportJob: airqoacr.azurecr.io/airqo-analytics-report-job
    redisContainer: airqoacr.azurecr.io/airqo-redis
    devicesSummaryJob: airqoacr.azurecr.io/airqo-analytics-devices-summary-job
  tag: latest

externalSecret:
  enabled: true

api:
  name: airqo-analytics-api
  label: analytics-api
  secret: prod-env-analytics
  replicaCount: 2
  podAnnotations: {}

  resources:
    common:
      limits:
        cpu: 200m
        memory: 1000Mi
      requests:
        cpu: 10m
        memory: 250Mi
    redis:
      requests:
        cpu: 50m
        memory: 10Mi
      limits:
        cpu: 300m
        memory: 50Mi

jobs:
  reports:
    name: analytics-report
    secret: prod-env-analytics-report-job
  resources:
    requests:
      cpu: 500m
      memory: 1000Mi
    limits:
      cpu: 1000m
      memory: 4000Mi

volumeMounts:
  - name: config-volume
    mountPath: /etc/config

volumes:
  - name: config-volume
    configMap:
      name: analytics-config-files

service:
  type: NodePort
  ports:
    - name: analytics-api
      port: 5000
      protocol: TCP
      targetPort: 5000
      nodePort: 30003
    - name: redis-server
      port: 6379
      targetPort: 6379
      nodePort: 30114
      protocol: TCP

ingress:
  enabled: false

autoscaling:
  minReplicas: 1
  maxReplicas: 2
  targetMemoryUtilizationPercentage: 85