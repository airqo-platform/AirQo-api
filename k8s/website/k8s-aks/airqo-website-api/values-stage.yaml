app:
  name: airqo-stage-website-api
  label: stawebsite-api
  secret: sta-env-website-backend
  namespace: staging
replicaCount: 2
image:
  repository: airqoacr.azurecr.io/airqo-stage-website-api
  tag: stage-25ea1e53-1778062061
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi
volumeMounts:
