[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "airqoair"
version = "0.1.1"
description = "Openair-inspired Python tools for air quality analysis, visualisation, and mapping"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "AirQo Engineering", email = "data@airqo.net" }
]
keywords = ["air quality", "openair", "pollution", "meteorology", "mapping", "airqo"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Topic :: Scientific/Engineering :: Atmospheric Science",
]
dependencies = [
  "numpy>=1.26,<3",
  "pandas>=2.1,<3",
  "matplotlib>=3.8,<4",
  "folium>=0.16,<0.21",
  "branca>=0.7,<0.9",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
]
docs = [
  "mkdocs>=1.6,<2",
  "mkdocs-material>=9.5,<10",
  "pyyaml>=6,<7",
  "pymdown-extensions>=10,<11",
]

[project.urls]
Homepage = "https://github.com/airqo-platform/AirQo-api"
Repository = "https://github.com/airqo-platform/AirQo-api"
Issues = "https://github.com/airqo-platform/AirQo-api/issues"
Documentation = "https://airqoair-project.github.io/book"

[tool.setuptools]
package-dir = { "" = "airqoair" }

[tool.setuptools.packages.find]
where = ["airqoair"]
